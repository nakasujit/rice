<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>田んぼ診断 - 次にやることリスト</title>
<style>
  :root{
    --paper: #f6f1e2;
    --paper-deep: #ece3cc;
    --ine: #5d7a3f;       /* 稲の緑 */
    --ine-deep: #46602e;
    --hodo: #d4a437;      /* 黄金の穂 */
    --tsuchi: #6b4a2b;    /* 土色 */
    --warn: #b7282e;      /* 注意 */
    --ink: #3a3530;
    --ink-soft: #80766a;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:0 0 60px;
  }

  /* 上部の畦道風ヘッダー */
  header{
    background: linear-gradient(180deg, var(--ine) 0%, var(--ine-deep) 100%);
    padding:28px 20px 22px;
    color:#fbf8ef;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    bottom:0; left:0; right:0;
    height:14px;
    background:repeating-linear-gradient(
      -45deg,
      var(--hodo) 0 10px,
      transparent 10px 20px
    );
    opacity:0.5;
  }
  header h1{
    font-family:"Shippori Mincho","Noto Serif JP",serif;
    font-size:22px;
    letter-spacing:0.12em;
    margin-bottom:4px;
  }
  header p{
    font-size:12px;
    letter-spacing:0.1em;
    opacity:0.85;
  }

  main{
    max-width:480px;
    margin:0 auto;
    padding:22px 18px;
  }

  /* セクション見出し */
  .section-label{
    font-family:"Shippori Mincho","Noto Serif JP",serif;
    font-size:14px;
    letter-spacing:0.15em;
    color:var(--ine-deep);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label .num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--ine);
    color:#fff;
    font-size:12px;
    font-weight:700;
    flex-shrink:0;
  }

  /* 画像アップロード領域（田んぼの区画イメージ） */
  .upload-area{
    position:relative;
    border:2px dashed var(--ine);
    border-radius:10px;
    background:var(--paper-deep);
    min-height:170px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:18px;
    margin-bottom:22px;
    cursor:pointer;
    overflow:hidden;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .upload-area.has-image{
    border-style:solid;
    padding:0;
  }
  .upload-area:active{
    background:#e6dbbf;
  }
  .upload-area img{
    width:100%;
    height:100%;
    max-height:260px;
    object-fit:cover;
    display:block;
  }
  .upload-icon{
    font-size:34px;
    margin-bottom:8px;
    color:var(--ine);
  }
  .upload-text{
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.7;
  }
  .upload-text strong{
    color:var(--ine-deep);
  }
  .retake-badge{
    position:absolute;
    bottom:10px;
    right:10px;
    background:rgba(58,53,48,0.65);
    color:#fff;
    font-size:11px;
    padding:5px 10px;
    border-radius:999px;
    letter-spacing:0.05em;
  }
  #fileInput{ display:none; }

  /* メモ欄 */
  textarea{
    width:100%;
    border:1px solid var(--paper-deep);
    border-radius:8px;
    background:#fff;
    padding:12px 14px;
    font-family:inherit;
    font-size:14px;
    color:var(--ink);
    resize:vertical;
    min-height:64px;
    margin-bottom:22px;
    line-height:1.6;
  }
  textarea:focus{
    outline:2px solid var(--ine);
    outline-offset:1px;
  }
  textarea::placeholder{ color:#b3a690; }

  /* 診断ボタン */
  .analyze-btn{
    -webkit-tap-highlight-color: transparent;
    appearance:none;
    border:none;
    cursor:pointer;
    width:100%;
    font-family:"Shippori Mincho","Noto Serif JP",serif;
    font-size:17px;
    font-weight:700;
    letter-spacing:0.2em;
    color:#fff;
    background:linear-gradient(180deg, var(--ine) 0%, var(--ine-deep) 100%);
    padding:16px 0;
    border-radius:999px;
    box-shadow:0 10px 22px -8px rgba(70,96,46,0.5);
    transition: transform 0.15s ease, opacity 0.2s ease;
  }
  .analyze-btn:active{
    transform:translateY(2px) scale(0.99);
  }
  .analyze-btn:disabled{
    opacity:0.5;
    cursor:default;
  }

  /* ローディング */
  .loading{
    display:none;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:18px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .loading.show{ display:flex; }
  .spinner{
    width:18px; height:18px;
    border:3px solid var(--paper-deep);
    border-top-color:var(--ine);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .error-box{
    display:none;
    margin-top:18px;
    background:#fbe9e6;
    border:1px solid var(--warn);
    color:var(--warn);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.6;
  }
  .error-box.show{ display:block; }

  /* 結果エリア */
  .result{
    display:none;
    margin-top:28px;
  }
  .result.show{ display:block; }

  .stage-card{
    background:#fff;
    border-radius:10px;
    border:1px solid var(--paper-deep);
    padding:16px 18px;
    margin-bottom:18px;
  }
  .stage-card .stage-label{
    font-size:11px;
    letter-spacing:0.15em;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .stage-card .stage-value{
    font-family:"Shippori Mincho","Noto Serif JP",serif;
    font-size:19px;
    color:var(--ine-deep);
    margin-bottom:8px;
  }
  .stage-card .stage-desc{
    font-size:13px;
    line-height:1.8;
    color:var(--ink);
  }

  /* ToDoカード */
  .todo-card{
    background:#fff;
    border-radius:10px;
    border:1px solid var(--paper-deep);
    border-left:5px solid var(--ine);
    padding:14px 16px;
    margin-bottom:12px;
    position:relative;
  }
  .todo-card.priority-high{ border-left-color:var(--warn); }
  .todo-card.priority-mid{ border-left-color:var(--hodo); }

  .todo-head{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .todo-icon{
    font-size:20px;
    flex-shrink:0;
  }
  .todo-title{
    font-family:"Shippori Mincho","Noto Serif JP",serif;
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    flex:1;
  }
  .todo-priority{
    font-size:10px;
    letter-spacing:0.08em;
    padding:3px 8px;
    border-radius:999px;
    color:#fff;
    flex-shrink:0;
    white-space:nowrap;
  }
  .priority-high .todo-priority{ background:var(--warn); }
  .priority-mid .todo-priority{ background:var(--hodo); }
  .priority-low .todo-priority{ background:var(--ine); }

  .todo-detail{
    font-size:13px;
    line-height:1.8;
    color:#5a5249;
    padding-left:30px;
  }

  .todo-timing{
    font-size:11px;
    color:var(--ink-soft);
    padding-left:30px;
    margin-top:6px;
    letter-spacing:0.04em;
  }
  .todo-timing::before{
    content:"⏱ ";
  }

  .note-card{
    background:var(--paper-deep);
    border-radius:10px;
    padding:14px 16px;
    font-size:12.5px;
    line-height:1.8;
    color:var(--ink-soft);
    margin-top:6px;
  }

  footer{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:30px;
    letter-spacing:0.05em;
    line-height:1.8;
  }
</style>
</head>
<body>

<header>
  <h1>田んぼ診断</h1>
  <p>写真から今やるべきことをチェック</p>
</header>

<main>

  <div class="section-label"><span class="num">1</span>田んぼの写真</div>
  <div class="upload-area" id="uploadArea">
    <div id="uploadPlaceholder">
      <div class="upload-icon">🌾</div>
      <div class="upload-text">
        タップして写真を選択<br>
        <strong>稲・畦・水面・雑草</strong>などが<br>わかる写真がおすすめです
      </div>
    </div>
    <img id="previewImg" style="display:none;">
    <div class="retake-badge" id="retakeBadge" style="display:none;">タップして変更</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment">

  <div class="section-label"><span class="num">2</span>状況メモ（任意）</div>
  <textarea id="memo" placeholder="例：田植えから約2か月、品種はコシヒカリ、最近の天気は雨が多い、など"></textarea>

  <button class="analyze-btn" id="analyzeBtn">この写真で診断する</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>写真を確認しています…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result">
    <div class="section-label"><span class="num">3</span>診断結果</div>

    <div class="stage-card">
      <div class="stage-label">いまの生育ステージ（推定）</div>
      <div class="stage-value" id="stageValue">-</div>
      <div class="stage-desc" id="stageDesc">-</div>
    </div>

    <div class="section-label"><span class="num">4</span>次にやることリスト</div>
    <div id="todoList"></div>

    <div class="note-card" id="noteCard"></div>
  </div>

</main>

<footer>
  ※ この診断はAIによる写真からの推定です。<br>
  実際の作業は地域の気候・JAや指導員の情報も<br>あわせてご確認ください。
</footer>

<script>
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');
  const uploadPlaceholder = document.getElementById('uploadPlaceholder');
  const previewImg = document.getElementById('previewImg');
  const retakeBadge = document.getElementById('retakeBadge');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const result = document.getElementById('result');
  const stageValue = document.getElementById('stageValue');
  const stageDesc = document.getElementById('stageDesc');
  const todoList = document.getElementById('todoList');
  const noteCard = document.getElementById('noteCard');
  const memo = document.getElementById('memo');

  let imageBase64 = null;
  let imageMediaType = null;

  uploadArea.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    imageMediaType = file.type;

    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      imageBase64 = dataUrl.split(',')[1];

      previewImg.src = dataUrl;
      previewImg.style.display = 'block';
      uploadPlaceholder.style.display = 'none';
      retakeBadge.style.display = 'block';
      uploadArea.classList.add('has-image');
    };
    reader.readAsDataURL(file);
  });

  const icons = {
    weeding: "🌿",
    herbicide: "🧪",
    water: "💧",
    fertilizer: "🌱",
    pest: "🐛",
    combine: "🚜",
    drying: "☀️",
    inspection: "🔍",
    other: "📋"
  };

  function iconFor(category){
    return icons[category] || icons.other;
  }

  function priorityLabel(p){
    if(p === 'high') return '優先度：高';
    if(p === 'mid') return '優先度：中';
    return '優先度：低';
  }

  analyzeBtn.addEventListener('click', async () => {
    errorBox.classList.remove('show');
    result.classList.remove('show');

    if (!imageBase64) {
      errorBox.textContent = '先に田んぼの写真を選択してください。';
      errorBox.classList.add('show');
      return;
    }

    analyzeBtn.disabled = true;
    loading.classList.add('show');

    const today = new Date();
    const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
    const memoText = memo.value.trim();

    const systemPrompt = `あなたは日本の水稲栽培に詳しい営農指導員です。
ユーザーが送る田んぼの写真（と任意のメモ）から、稲の生育ステージを推定し、
「いまから今後1〜2週間程度で行うべき作業（ToDo）」を整理してください。

考慮する作業の例：除草剤・畔の草刈り・水管理（入水・落水・中干し）・追肥・病害虫の見回り・
コンバインによる収穫準備・収穫後の乾燥・次作の準備　など。
写真からはっきり判断できない場合は、複数の可能性を踏まえつつ、
一般的な季節（${dateStr}頃）から考えて妥当な作業を提案してください。

必ず次のJSON形式のみで回答してください。前置きや説明、Markdownのコードブロック記号は一切付けないでください。

{
  "stage": "推定される生育ステージ（例：分げつ期、出穂期、収穫期など）を15文字程度で",
  "stage_desc": "そのステージと写真から読み取れる状況についての説明（80文字程度）",
  "todos": [
    {
      "category": "weeding | herbicide | water | fertilizer | pest | combine | drying | inspection | other のいずれか",
      "title": "作業名（10文字程度）",
      "detail": "具体的な作業内容や注意点（60〜100文字程度）",
      "timing": "目安となる時期や期限（例：今週中、出穂前まで、など20文字程度）",
      "priority": "high | mid | low"
    }
  ],
  "note": "全体への一言アドバイスや、写真から判断しきれない点への補足（80字程度）"
}

todosは3〜5件にしてください。`;

    const userText = memoText
      ? `状況メモ：${memoText}\n今日の日付：${dateStr}\nこの田んぼの写真を見て、上記フォーマットのJSONで回答してください。`
      : `今日の日付：${dateStr}\nこの田んぼの写真を見て、上記フォーマットのJSONで回答してください。`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [
            {
              role: "user",
              content: [
                {
                  type: "image",
                  source: {
                    type: "base64",
                    media_type: imageMediaType || "image/jpeg",
                    data: imageBase64
                  }
                },
                { type: "text", text: userText }
              ]
            }
          ]
        })
      });

      const data = await response.json();
      const textBlock = (data.content || []).find(c => c.type === 'text');
      if (!textBlock) throw new Error('応答を取得できませんでした。');

      let clean = textBlock.text.trim();
      clean = clean.replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();

      const parsed = JSON.parse(clean);

      stageValue.textContent = parsed.stage || '-';
      stageDesc.textContent = parsed.stage_desc || '';

      todoList.innerHTML = '';
      (parsed.todos || []).forEach(todo => {
        const card = document.createElement('div');
        card.className = `todo-card priority-${todo.priority || 'low'}`;
        card.innerHTML = `
          <div class="todo-head">
            <span class="todo-icon">${iconFor(todo.category)}</span>
            <span class="todo-title">${escapeHtml(todo.title || '')}</span>
            <span class="todo-priority">${priorityLabel(todo.priority)}</span>
          </div>
          <div class="todo-detail">${escapeHtml(todo.detail || '')}</div>
          <div class="todo-timing">${escapeHtml(todo.timing || '')}</div>
        `;
        todoList.appendChild(card);
      });

      noteCard.textContent = parsed.note || '';

      result.classList.add('show');
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      console.error(err);
      errorBox.textContent = '診断中にエラーが発生しました。もう一度お試しください。';
      errorBox.classList.add('show');
    } finally {
      analyzeBtn.disabled = false;
      loading.classList.remove('show');
    }
  });

  function escapeHtml(str){
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
